name: Deploy Daysi App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  AWS_REGION: us-east-1
  ECR_REPOSITORY_NONPROD: daysi/nonprod/api
  ECR_REPOSITORY_PROD: daysi/prod/api

jobs:
  # Lint and Type Check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type Check Contracts
        run: npm run typecheck:contracts

      - name: Type Check Domain
        run: npm run typecheck:domain

      - name: Type Check API
        run: npm run typecheck:api

      - name: Type Check Frontend
        run: npx tsc -p tsconfig.app.json --noEmit

  # Run Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run platform tests
        run: npm run test:platform

  # Build Frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_DAYSI_API_URL: https://daysi.ca
          VITE_DAYSI_DEFAULT_LOCATION_SLUG: daysi-flagship
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1

  # Deploy to Non-Production
  deploy-nonprod:
    name: Deploy to Non-Production
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main'
    environment:
      name: nonprod
      url: https://staging.daysi.ca
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_NONPROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_NONPROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://daysi-nonprod-frontend --delete --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_NONPROD }} \
            --paths "/*"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_NONPROD:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_NONPROD:latest \
            -f apps/api/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_NONPROD:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_NONPROD:latest

      - name: Run database migrations (nonprod)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster daysi-nonprod \
            --task-definition daysi-nonprod-migrate \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET_NONPROD }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP_NONPROD }}],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"api\",\"command\":[\"tsx\",\"apps/api/src/migrate.ts\"]}]}" \
            --query "tasks[0].taskArn" --output text)
          echo "Migration task ARN: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster daysi-nonprod --tasks $TASK_ARN
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster daysi-nonprod \
            --tasks $TASK_ARN \
            --query "tasks[0].containers[0].exitCode" --output text)
          echo "Migration exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || (echo "Migration failed" && exit 1)

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster daysi-nonprod \
            --service daysi-nonprod-api \
            --force-new-deployment

  # Deploy to Production
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-nonprod]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://daysi.ca
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://daysi-prod-frontend --delete --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD }} \
            --paths "/*"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_PROD:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY_PROD:latest \
            -f apps/api/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_PROD:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_PROD:latest

      - name: Run database migrations (prod)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster daysi-prod \
            --task-definition daysi-prod-migrate \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_SUBNET_PROD }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP_PROD }}],assignPublicIp=DISABLED}" \
            --overrides "{\"containerOverrides\":[{\"name\":\"api\",\"command\":[\"tsx\",\"apps/api/src/migrate.ts\"]}]}" \
            --query "tasks[0].taskArn" --output text)
          echo "Migration task ARN: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster daysi-prod --tasks $TASK_ARN
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster daysi-prod \
            --tasks $TASK_ARN \
            --query "tasks[0].containers[0].exitCode" --output text)
          echo "Migration exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || (echo "Migration failed" && exit 1)

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster daysi-prod \
            --service daysi-prod-api \
            --force-new-deployment

      - name: Notify deployment
        run: |
          echo "Production deployment completed successfully!"
